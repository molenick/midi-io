name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - run: rustup target add wasm32-unknown-unknown
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.126
      - name: Build wasm
        working-directory: examples/web_synth_app
        run: cargo build --release --target wasm32-unknown-unknown
      - name: Generate bindings
        run: |
          wasm-bindgen --target web --out-dir dist \
            examples/web_synth_app/target/wasm32-unknown-unknown/release/web_synth_app.wasm
          cp examples/web_synth_app/index.html dist/index.html
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v5
