name: macOS

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add --toolchain nightly rustfmt
      - run: cargo +nightly fmt --check
      - run: cargo check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo build --examples
      - run: cargo test

  msrv:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install 1.78 --profile minimal
      - run: cargo +1.78 build
      - run: cargo +1.78 build --no-default-features

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim
      - name: Build (device target)
        run: cargo build --target aarch64-apple-ios
      - name: Build (simulator target)
        run: cargo build --target aarch64-apple-ios-sim
      - name: Clippy (simulator target)
        run: cargo clippy --target aarch64-apple-ios-sim --all-targets -- -D warnings
      - name: Unit tests on simulator
        run: bash scripts/test-ios.sh
